<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Desbloquear</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="top">
    <span class="badge">CONTEÚDO EXCLUSIVO</span>
    <h1>Desbloqueie o Acesso</h1>
    <p>Complete as ações abaixo para liberar</p>
  </div>

  <div class="card">

    <div class="progress-info">
      <span id="progressText">0/4 ações concluídas</span>
      <span id="percent">0%</span>
    </div>

    <div class="progress-bar">
      <div id="progress"></div>
    </div>

    <!-- AÇÕES -->
    <div class="task" id="task1">
      <div>
        <b>Siga meu canal do zap</b>
        <small>Acesse e aguarde</small>
      </div>
      <button onclick="complete(1,'https://whatsapp.com/channel/0029VbC7FWcJENxsIOsndS15')">Ir</button>
    </div>

    <div class="task" id="task2">
      <div>
        <b>Grupo chat 24h</b>
        <small>Entre no grupo</small>
      </div>
      <button onclick="complete(2,'https://chat.whatsapp.com/JRp7UwHFhfPIFokS5iGre9')">Ir</button>
    </div>

    <div class="task" id="task3">
      <div>
        <b>Se inscreva no YouTube</b>
        <small>Ative notificações</small>
      </div>
      <button onclick="complete(3,'https://www.youtube.com/@Vortex-Ofc1')">Ir</button>
    </div>

    <div class="task" id="task4">
      <div>
        <b>Like no vídeo</b>
        <small>Apoie o canal</small>
      </div>
      <button onclick="complete(4,'https://youtu.be/mTE6soYWmfA?si=QrxFGwEoCM00I-Kh')">Ir</button>
    </div>

    <button id="unlockBtn" class="unlock" disabled onclick="unlock()">
      🔒 Complete todas as ações
    </button>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
